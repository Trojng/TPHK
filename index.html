<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Cây Kí Ức 3D - 12A2 Trần Phú</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500;1,600&family=Quicksand:wght@400;500;600&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; font-family: 'Quicksand', sans-serif; background: #b8e0f0; }

  #canvas-container { position: fixed; inset: 0; z-index: 0; }
  #canvas-container canvas { display: block; outline: none; }

  /* UI overlay layout */
  .ui-layer { position: absolute; inset: 0; pointer-events: none; z-index: 10; display: flex; flex-direction: column; justify-content: space-between; padding: 20px; }
  .ui-interactive { pointer-events: auto; }

  header { text-align: center; background: linear-gradient(to bottom, rgba(255,255,255,0.7) 0%, rgba(255,255,255,0) 100%); padding: 15px 10px 40px 10px; width: 100%; align-self: center; }
  h1 { font-family: 'Cormorant Garamond', serif; font-size: 2.5rem; font-weight: 600; color: #2c4c38; margin-bottom: 4px; letter-spacing: -0.5px; }
  .subtitle { font-size: 0.95rem; color: #5a7363; font-weight: 500; letter-spacing: 1px; text-transform: uppercase; }

  .bottom-bar { display: flex; justify-content: space-between; align-items: flex-end; width: 100%; }
  .btn-group { display: flex; gap: 10px; }
  .btn { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.6); padding: 12px 20px; font-family: inherit; font-size: 0.95rem; font-weight: 600; color: #2c4c38; border-radius: 30px; cursor: pointer; display: flex; align-items: center; gap: 8px; box-shadow: 0 4px 16px rgba(44,76,56,0.08); transition: all 0.3s; }
  .btn:hover { background: #fff; transform: translateY(-2px); }
  .btn-primary { background: #3d664c; color: #ffffff; border-color: #3d664c; }
  .btn-primary:hover { background: #4a7a5b; color: #fff; }

  .modal-overlay { position: fixed; inset: 0; background: rgba(24, 38, 30, 0.4); backdrop-filter: blur(4px); z-index: 100; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.4s; padding: 20px; }
  .modal-overlay.active { opacity: 1; pointer-events: auto; }
  .modal-card { background: rgba(255,255,255,0.94); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.8); width: 100%; max-width: 440px; border-radius: 24px; padding: 30px; box-shadow: 0 20px 50px rgba(0,0,0,0.15); transform: translateY(20px); transition: transform 0.4s; position: relative; }
  .modal-overlay.active .modal-card { transform: translateY(0); }
  .modal-close { position: absolute; top: 20px; right: 20px; background: none; border: none; font-size: 1.5rem; color: #888; cursor: pointer; padding: 5px; }

  .form-group { margin-bottom: 20px; display: flex; flex-direction: column; gap: 8px; }
  label { font-size: 0.85rem; font-weight: 600; color: #5a7363; text-transform: uppercase; }
  input[type="text"], textarea { width: 100%; padding: 14px 16px; border-radius: 12px; border: 1px solid rgba(0,0,0,0.1); font-family: inherit; outline: none; transition: 0.2s; }
  input[type="text"]:focus, textarea:focus { border-color: #3d664c; box-shadow: 0 0 0 3px rgba(61,102,76,0.1); }
  textarea { resize: none; height: 110px; }

  .image-picker-zone { border: 2px dashed rgba(61,102,76,0.25); border-radius: 16px; padding: 25px 15px; text-align: center; cursor: pointer; position: relative; overflow: hidden; display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .image-picker-zone:hover { border-color: #3d664c; background: rgba(61,102,76,0.05); }
  .picker-preview { position: absolute; inset: 0; background-size: cover; background-position: center; display: none; z-index: 2; }

  #view-card { max-width: 480px; padding: 0; overflow: hidden; }
  .view-img-wrapper { width: 100%; height: 320px; background: #ececec; background-size: cover; background-position: center; }
  .view-content-box { padding: 30px; }
  .view-caption { font-family: 'Cormorant Garamond', serif; font-size: 1.5rem; font-style: italic; color: #233b2c; margin-bottom: 20px; white-space: pre-wrap; }
  .view-meta { display: flex; justify-content: space-between; border-top: 1px solid #f0f4f1; padding-top: 15px; }
  .view-author { font-size: 0.95rem; font-weight: 600; color: #3d664c; }

  #empty-hint { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; background: rgba(255,255,255,0.6); padding: 20px 30px; border-radius: 20px; backdrop-filter: blur(10px); z-index: 5; }
  #loader { position: fixed; inset: 0; background: #b8e0f0; z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 15px; transition: opacity 0.4s; }
  #loader.hidden { opacity: 0; pointer-events: none; }
  .spinner { width: 40px; height: 40px; border: 3px solid rgba(61,102,76,0.1); border-top-color: #3d664c; border-radius: 50%; animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .hidden { display: none !important; }
</style>
</head>
<body>

<div id="loader">
  <div class="spinner"></div>
  <p>Đang tải không gian kỉ niệm 3D...</p>
</div>

<div id="canvas-container"></div>

<div class="ui-layer">
  <header class="ui-interactive">
    <h1>Ký ức Trần Phú - Hoàn Kiếm</h1>
    <div class="subtitle">Tập thể lớp 12A2 - Niên khóa K63</div>
  </header>

  <div id="empty-hint" class="hidden">
    <p style="font-weight: bold; color: #4a7a5b;">Cây kí ức chưa có kỉ niệm nào...</p>
    <span style="font-size: 0.85rem; color: #7a9484;">Hãy là người đầu tiên treo bức ảnh của mình nhé!</span>
  </div>

  <div class="bottom-bar">
    <div class="btn-group ui-interactive">
      <button class="btn" id="btn-fall-trigger">🍃 Lá rơi</button>
    </div>
    <div class="btn-group ui-interactive">
      <button class="btn btn-primary" id="btn-add-trigger">✨ Gửi Kỉ Niệm</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-add">
  <div class="modal-card">
    <button class="modal-close" id="btn-add-close">&times;</button>
    <div style="font-family: 'Cormorant Garamond', serif; font-size: 1.8rem; font-weight: bold; color: #2c4c38; margin-bottom: 20px;">Gửi Kỉ Niệm Lên Cây</div>
    <form id="form-memory">
      <div class="form-group">
        <label>Bức ảnh kỉ niệm</label>
        <div class="image-picker-zone" id="picker-zone">
          <div style="font-size: 2rem;">📸</div>
          <div style="font-size: 0.9rem;">Nhấp để chọn ảnh</div>
          <div class="picker-preview" id="picker-preview-img"></div>
        </div>
        <input type="file" id="input-file" accept="image/*" style="display: none;" />
      </div>
      <div class="form-group">
        <label>Lời nhắn</label>
        <textarea id="input-caption" placeholder="Viết vài dòng lưu bút..." required></textarea>
      </div>
      <div class="form-group">
        <label>Tên của bạn</label>
        <input type="text" id="input-author" placeholder="Ví dụ: Mỹ Nguyễn" required />
      </div>
      <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; padding: 14px;">Treo Lên Cây Kí Ức</button>
    </form>
  </div>
</div>

<div class="modal-overlay" id="modal-view">
  <div class="modal-card" id="view-card">
    <button class="modal-close" id="btn-view-close" style="z-index: 10; color: #fff; background: rgba(0,0,0,0.3); border-radius: 50%; width: 32px; height: 32px;">&times;</button>
    <div class="view-img-wrapper" id="view-photo"></div>
    <div class="view-content-box">
      <div class="view-caption" id="view-caption">Nội dung...</div>
      <div class="view-meta">
        <div class="view-author">✍️ <span id="view-author">Tên</span></div>
        <div style="font-size: 0.8rem; color: #9aa7a0;" id="view-date">Date</div>
      </div>
    </div>
  </div>
</div>

<script>
/* ============================================================================
   BƯỚC 1: ĐIỀN MÃ BIN_ID CỦA BẠN VÀO ĐÂY
============================================================================ */
const BIN_ID = "ĐIỀN_MÃ_BIN_ID_CỦA_BẠN_VÀO_ĐÂY"; 
const API_KEY = "$2a$10$pBm8gHhqid7CnboOjcbocewzpD2kYAU.CbKnzCfff1NCmU1giSYEO"; 

/* ============================================================================
   HỆ THỐNG ĐỒNG BỘ ĐÁM MÂY
============================================================================ */
async function dbGetAllMemories() {
  if (!BIN_ID || BIN_ID.includes("ĐIỀN_MÃ")) return [];
  try {
    const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
      headers: { "X-Master-Key": API_KEY }
    });
    if (!res.ok) return [];
    const data = await res.json();
    if (data && data.record && Array.isArray(data.record.memories)) return data.record.memories;
    return [];
  } catch (e) { return []; }
}

async function dbSaveAllMemories(memoriesArray) {
  try {
    const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
      method: "PUT",
      headers: { "Content-Type": "application/json", "X-Master-Key": API_KEY },
      body: JSON.stringify({ memories: memoriesArray })
    });
    return res.ok;
  } catch (e) { return false; }
}

/* ============================================================================
   DỰNG HÌNH CÂY 3D (GIAO DIỆN NGUYÊN BẢN MƯỢT MÀ)
============================================================================ */
const LEAF_COUNT = 5000; 
let scene, camera, renderer, controls, leafParticles, leafGeometry;
let leafPositions = [], leafSpeeds = [];
let isFoliageFalling = false;
let allMemoriesCache = [];
let clickablePhotoMeshes = [];
let raycaster = new THREE.Raycaster();
let mouse = new THREE.Vector2();

// Vỏ cây mượt mà không lồi lõm
function makeBarkMaterial() {
  const canvas = document.createElement('canvas');
  canvas.width = 256; canvas.height = 256;
  const ctx = canvas.getContext('2d');
  
  const g = ctx.createLinearGradient(0, 0, 256, 0);
  g.addColorStop(0, '#5C4033');
  g.addColorStop(0.5, '#8B5A2B');
  g.addColorStop(1, '#4A3525');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, 256, 256);

  ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
  for (let i = 0; i < 40; i++) {
    const x = Math.random() * 256;
    const w = 1 + Math.random() * 3;
    ctx.fillRect(x, 0, w, 256);
  }
  const tex = new THREE.CanvasTexture(canvas);
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  return new THREE.MeshStandardMaterial({ map: tex, roughness: 0.85 });
}

function createTreeStructure(scene) {
  const barkMat = makeBarkMaterial();
  const trunkGeo = new THREE.CylinderGeometry(0.35, 0.75, 5, 12);
  trunkGeo.translate(0, 2.5, 0);
  scene.add(new THREE.Mesh(trunkGeo, barkMat));

  const branches = [
    { len: 4.2, r1: 0.28, r2: 0.15, rotZ: 0.65, rotY: 0.2, posY: 2.8 },
    { len: 3.8, r1: 0.24, r2: 0.12, rotZ: -0.58, rotY: 2.1, posY: 3.3 },
    { len: 3.6, r1: 0.22, r2: 0.10, rotZ: 0.52, rotY: -1.4, posY: 3.9 },
    { len: 4.0, r1: 0.25, r2: 0.12, rotZ: -0.62, rotY: -2.7, posY: 3.1 }
  ];
  branches.forEach(cfg => {
    const bGeo = new THREE.CylinderGeometry(cfg.r2, cfg.r1, cfg.len, 8);
    bGeo.translate(0, cfg.len / 2, 0);
    const bMesh = new THREE.Mesh(bGeo, barkMat);
    bMesh.position.y = cfg.posY;
    bMesh.rotation.set(0, cfg.rotY, cfg.rotZ);
    scene.add(bMesh);
  });
}

function setupLushCanopy() {
  leafGeometry = new THREE.BufferGeometry();
  const coords = new Float32Array(LEAF_COUNT * 3);
  const colors = new Float32Array(LEAF_COUNT * 3);
  const col1 = new THREE.Color('#386144'), col2 = new THREE.Color('#4c7d59');

  for (let i = 0; i < LEAF_COUNT; i++) {
    let x, y, z;
    do {
      x = (Math.random() - 0.5) * 15;
      z = (Math.random() - 0.5) * 15;
      y = 8 + (Math.random() - 0.5) * 8.5;
    } while ((x*x + z*z) > 56.25);

    coords[i*3] = x; coords[i*3+1] = y; coords[i*3+2] = z;
    leafPositions.push({ x, y, z, originY: y });
    leafSpeeds.push(0.04 + Math.random() * 0.05);

    let c = Math.random() > 0.5 ? col1 : col2;
    colors[i*3] = c.r; colors[i*3+1] = c.g; colors[i*3+2] = c.b;
  }
  leafGeometry.setAttribute('position', new THREE.BufferAttribute(coords, 3));
  leafGeometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

  const c = document.createElement('canvas'); c.width = c.height = 64;
  const ctx = c.getContext('2d'); ctx.fillStyle = '#3a6647';
  ctx.beginPath(); ctx.moveTo(32, 5); ctx.quadraticCurveTo(55, 20, 32, 58); ctx.quadraticCurveTo(9, 20, 32, 5); ctx.fill();
  
  const leafMat = new THREE.PointsMaterial({ size: 0.3, map: new THREE.CanvasTexture(c), transparent: true, alphaTest: 0.4, vertexColors: true, depthWrite: false });
  leafParticles = new THREE.Points(leafGeometry, leafMat);
  scene.add(leafParticles);
}

function makePhotoFrameMesh(mem) {
  const pGroup = new THREE.Group();
  pGroup.position.set(mem.pos.x, mem.pos.y, mem.pos.z);
  pGroup.rotation.y = mem.pos.rotY;
  pGroup.scale.set(0.001, 0.001, 0.001);

  const canvas = document.createElement('canvas'); canvas.width = 320; canvas.height = 400;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#fff'; ctx.fillRect(0,0,320,400);
  ctx.fillStyle = '#3d664c'; ctx.font = 'bold 18px Quicksand'; ctx.textAlign = 'center';
  ctx.fillText(mem.author.substring(0, 18), 160, 365);

  const cMat = new THREE.MeshBasicMaterial({ map: new THREE.CanvasTexture(canvas), side: THREE.DoubleSide });
  pGroup.add(new THREE.Mesh(new THREE.PlaneGeometry(1.2, 1.5), cMat));

  const img = new Image(); img.src = mem.imageData;
  img.onload = () => {
    const ic = document.createElement('canvas'); ic.width = ic.height = 280;
    const ictx = ic.getContext('2d');
    const scale = Math.max(280/img.width, 280/img.height);
    ictx.drawImage(img, (280 - img.width*scale)/2, (280 - img.height*scale)/2, img.width*scale, img.height*scale);
    
    const iMesh = new THREE.Mesh(new THREE.PlaneGeometry(1.05, 1.05), new THREE.MeshBasicMaterial({ map: new THREE.CanvasTexture(ic) }));
    iMesh.position.set(0, 0.16, 0.01);
    pGroup.add(iMesh);
  };
  pGroup.userData = { data: mem };
  return pGroup;
}

function setupThreeEngine() {
  scene = new THREE.Scene(); scene.background = new THREE.Color('#b8e0f0');
  camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 1000);
  camera.position.set(0, 5, 15);
  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.getElementById('canvas-container').appendChild(renderer.domElement);
  
  controls = new THREE.OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true; controls.maxPolarAngle = Math.PI/2 - 0.02;

  scene.add(new THREE.AmbientLight('#fff', 0.65));
  const sun = new THREE.DirectionalLight('#fffdf0', 0.8); sun.position.set(10, 20, 10); scene.add(sun);
  
  const ground = new THREE.Mesh(new THREE.PlaneGeometry(100, 100), new THREE.MeshStandardMaterial({ color: '#7da186' }));
  ground.rotation.x = -Math.PI/2; scene.add(ground);

  createTreeStructure(scene); setupLushCanopy();
  window.addEventListener('resize', () => { camera.aspect = window.innerWidth/window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); });
  renderer.domElement.addEventListener('pointerdown', (e) => {
    if (e.target.closest('.ui-layer') || e.target.closest('.modal-overlay')) return;
    mouse.x = (e.clientX/window.innerWidth)*2-1; mouse.y = -(e.clientY/window.innerHeight)*2+1;
    raycaster.setFromCamera(mouse, camera);
    const hit = raycaster.intersectObjects(clickablePhotoMeshes, true);
    if (hit.length) {
      let obj = hit[0].object; while(obj.parent && obj.parent.type==="Group") obj = obj.parent;
      if(obj.userData.data) {
        document.getElementById('view-photo').style.backgroundImage = `url(${obj.userData.data.imageData})`;
        document.getElementById('view-caption').innerText = obj.userData.data.caption;
        document.getElementById('view-author').innerText = obj.userData.data.author;
        document.getElementById('view-date').innerText = new Date(obj.userData.data.createdAt).toLocaleDateString('vi-VN');
        document.getElementById('modal-view').classList.add('active');
      }
    }
  });
}

function animate() {
  requestAnimationFrame(animate); controls.update();
  if (leafParticles) {
    const pos = leafGeometry.attributes.position.array;
    const t = Date.now() * 0.0008;
    for (let i = 0; i < LEAF_COUNT; i++) {
      if (isFoliageFalling) {
        leafPositions[i].y -= leafSpeeds[i];
        if (leafPositions[i].y < 0.05) leafPositions[i].y = 0.05;
      }
      pos[i*3] = leafPositions[i].x + Math.sin(t + i)*0.01;
      pos[i*3+1] = leafPositions[i].y;
      pos[i*3+2] = leafPositions[i].z + Math.cos(t*0.7 + i)*0.01;
    }
    leafGeometry.attributes.position.needsUpdate = true;
  }
  clickablePhotoMeshes.forEach(m => m.lookAt(camera.position.x, m.position.y, camera.position.z));
  renderer.render(scene, camera);
}

/* ============================================================================
   XỬ LÝ FORM & NÉN ẢNH CHỐNG LỖI
============================================================================ */
async function initApp() {
  setupThreeEngine();
  allMemoriesCache = await dbGetAllMemories();
  document.getElementById('loader').classList.add('hidden');
  animate();

  if (allMemoriesCache.length === 0) document.getElementById('empty-hint').classList.remove('hidden');
  else {
    allMemoriesCache.forEach((m, i) => {
      const mesh = makePhotoFrameMesh(m);
      scene.add(mesh); clickablePhotoMeshes.push(mesh);
      setTimeout(() => mesh.scale.set(1,1,1), i*100);
    });
  }

  const modalAdd = document.getElementById('modal-add');
  const input = document.getElementById('input-file');
  const preview = document.getElementById('picker-preview-img');
  let base64Img = "";

  document.getElementById('btn-add-trigger').onclick = () => modalAdd.classList.add('active');
  document.getElementById('btn-add-close').onclick = () => modalAdd.classList.remove('active');
  document.getElementById('btn-view-close').onclick = () => document.getElementById('modal-view').classList.remove('active');
  
  document.getElementById('picker-zone').onclick = () => input.click();
  
  // TỰ ĐỘNG NÉN ẢNH
  input.onchange = (e) => {
    if (!e.target.files[0]) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      const img = new Image();
      img.onload = () => {
        const c = document.createElement('canvas');
        const s = Math.min(1, 500/img.width); // Ép tối đa ngang 500px
        c.width = img.width*s; c.height = img.height*s;
        c.getContext('2d').drawImage(img, 0, 0, c.width, c.height);
        base64Img = c.toDataURL('image/jpeg', 0.6); // Chất lượng 60% siêu nhẹ
        preview.style.backgroundImage = `url(${base64Img})`;
        preview.style.display = 'block';
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(e.target.files[0]);
  };

  document.getElementById('form-memory').onsubmit = async (e) => {
    e.preventDefault();
    if (!base64Img) return alert("Vui lòng chọn ảnh!");
    if (BIN_ID.includes("ĐIỀN_MÃ")) return alert("Vui lòng cấu hình BIN_ID ở dòng 137 trong code!");

    const btn = e.target.querySelector('button'); btn.innerText = "Đang tải..."; btn.disabled = true;

    const t = (allMemoriesCache.length * 2 * Math.PI) / 1.618;
    const r = 2.4 + Math.random()*2.8;
    const newItem = {
      id: Date.now(),
      author: document.getElementById('input-author').value,
      caption: document.getElementById('input-caption').value,
      imageData: base64Img,
      createdAt: Date.now(),
      pos: { x: Math.cos(t)*r, y: 2.5+(allMemoriesCache.length*0.35)%4.8, z: Math.sin(t)*r, rotY: -t+Math.PI/2 }
    };

    allMemoriesCache.push(newItem);
    if (await dbSaveAllMemories(allMemoriesCache)) {
      document.getElementById('empty-hint').classList.add('hidden');
      const mesh = makePhotoFrameMesh(newItem);
      scene.add(mesh); clickablePhotoMeshes.push(mesh);
      mesh.scale.set(1,1,1);
      
      modalAdd.classList.remove('active');
      e.target.reset(); preview.style.display = 'none'; base64Img = "";
    } else {
      alert("Lỗi kết nối máy chủ! Hãy thử lại.");
      allMemoriesCache.pop();
    }
    btn.innerText = "Treo Lên Cây Kí Ức"; btn.disabled = false;
  };

  document.getElementById('btn-fall-trigger').onclick = (e) => {
    isFoliageFalling = !isFoliageFalling;
    e.target.innerText = isFoliageFalling ? "🍃 Ngừng rơi" : "🍃 Lá rơi";
    if(!isFoliageFalling) leafPositions.forEach(p => p.y = p.originY);
  };
}
window.onload = initApp;
</script>
</body>
</html>
